# Production Docker Compose — used by backend/deploy.sh PLATFORM=compose path.
# Postgres and Redis are NOT here; they are managed services (RDS + ElastiCache).
# Secrets come from .env.production — never commit that file.

services:
  web:
    image: ${IMAGE_NAME:-bolt-abacus-api}:${IMAGE_TAG:-latest}
    command: gunicorn config.wsgi:application --config gunicorn.conf.py
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    restart: unless-stopped
    healthcheck:
      # Python instead of curl — curl is not installed in the slim image.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health/').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: ${IMAGE_NAME:-bolt-abacus-api}:${IMAGE_TAG:-latest}
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    restart: unless-stopped

  beat:
    image: ${IMAGE_NAME:-bolt-abacus-api}:${IMAGE_TAG:-latest}
    command: celery -A config beat --loglevel=info
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    restart: unless-stopped

  # TLS termination + reverse proxy. Only Caddy-specific vars passed — DB/Redis
  # secrets never enter this container.
  caddy:
    image: caddy:2
    depends_on:
      - web
    environment:
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      ACME_CA: ${ACME_CA:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2019/config/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  caddy_data:
  caddy_config:
